version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: gentrack_db
    environment:
      POSTGRES_USER: gentrack
      POSTGRES_PASSWORD: gentrack123
      POSTGRES_DB: gentrack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: gentrack_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: